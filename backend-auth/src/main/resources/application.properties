spring.application.name=backend-auth
# Run this mini-project on port 8080
server.port=8080

# Database Configuration (Fixed with security parameters and consistent db name)
spring.datasource.url=jdbc:mysql://localhost:3306/api_app_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# ⚠️ MAKE SURE TO REPLACE THIS TEXT WITH YOUR ACTUAL ROOT PASSWORD!
